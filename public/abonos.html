<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Abono | GasControl</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/abonos.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>GasControl</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item">
                    <span>📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/abonos.html" class="nav-item active">
                    <span>💰</span>
                    <span>Registrar Abono</span>
                </a>
                <a href="/reportes.html" class="nav-item">
                    <span>📈</span>
                    <span>Reportes</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">Registrar Abono</h1>
                <div class="user-menu">
                    <span class="user-name" id="userName"></span>
                    <div class="user-avatar" id="userAvatar">MH</div>
                    <button id="logoutBtn" class="btn-outline">Salir</button>
                </div>
            </div>

            <div class="container">
                <div class="abono-card">
                    <div class="abono-header">
                        <h2>💰 Nuevo Abono de Gasolina</h2>
                        <p>Complete el formulario para registrar una nueva recarga o abono</p>
                    </div>
                    <div class="abono-body">
                        <div class="required-info">Los campos marcados con * son obligatorios</div>
                        
                        <form id="movimientoForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Fecha <span class="required">*</span></label>
                                    <input type="date" id="fecha" required>
                                </div>
                                <div class="form-group">
                                    <label>Tarjeta <span class="required">*</span></label>
                                    <select id="tarjeta_id" required>
                                        <option value="">Seleccionar tarjeta</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Unidad</label>
                                    <select id="unidad_id">
                                        <option value="">Seleccionar unidad (opcional)</option>
                                    </select>
                                </div>
                               <div class="form-group">
    <label>Conductor</label>
    <div class="search-container">
        <input type="text" 
               id="conductorInput" 
               class="search-input"
               placeholder="🔍 Buscar conductor..."
               autocomplete="off">
        <div id="conductorDropdown" class="search-dropdown"></div>
        <input type="hidden" id="empleado_id">
    </div>
    <div class="search-hint">Escribe el nombre del conductor para buscarlo</div>
</div>
                          

 <div class="form-group">
        <label>Departamento</label>
        <select id="departamento_id" disabled>
            <option value="">Se cargará automáticamente</option>
        </select>
    </div>
</div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Monto <span class="required">*</span></label>
                                    <input type="number" id="monto" step="0.01" placeholder="0.00" required>
                                </div>
                                
                            </div>

                            <div class="form-group">
                                <label>Observación</label>
                                <textarea id="observacion" rows="3" placeholder="Ej: Apoyo a unidad X, Recarga mensual..."></textarea>
                            </div>

                            <div class="form-buttons">
                                <button type="submit" class="btn-submit">
                                    💾 Registrar Abono
                                </button>
                                <button type="reset" class="btn-reset">
                                    🗑️ Limpiar
                                </button>
                            </div>

                            <div id="successMsg" class="success-msg"></div>
                            <div id="errorMsg" class="error-msg"></div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/abonos.js"></script>
</body>
</html>
