<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Control de Gasolina</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>⛽ GasControl</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item active">
                    <span>📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/abonos.html" class="nav-item">
                    <span>💰</span>
                    <span>Registrar Abono</span>
                </a>
                <a href="/reportes.html" class="nav-item">
                    <span>📈</span>
                    <span>Reportes</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Dashboard</h1>
                <div class="user-menu">
                    <span class="user-name" id="userName"></span>
                    <div class="user-avatar" id="userAvatar">MH</div>
                    <button id="logoutBtn" class="btn btn-outline">Salir</button>
                </div>
            </div>

            <div class="container">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-title">Presupuesto Inicial</div>
                        <div class="stat-value" id="montoInicial">$0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Total Gastado</div>
                        <div class="stat-value" id="montoGastado">$0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Presupuesto Restante</div>
                        <div class="stat-value" id="montoRestante">$0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Porcentaje</div>
                        <div class="stat-value" id="porcentaje">0%</div>
                    </div>
                </div>

                <!-- Últimos Movimientos -->
                <div class="form-section">
                    <div class="form-section-title">📋 Últimos Movimientos</div>
                    <div class="table-container">
                        <table id="movimientosTable">
                            <thead>
                                <tr><th>Fecha</th><th>Tarjeta</th><th>Unidad</th><th>Monto</th><th>Observación</th> </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="5" class="text-center">Cargando...</td> </tr>
                            </tbody>
                        </table>
                    </div>
                    <div style="margin-top: 1rem; text-align: center;">
                        <a href="/abonos.html" class="btn btn-primary">+ Registrar Nuevo Abono</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/dashboard.js"></script>
</body>
</html>
